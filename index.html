<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Store</title>

<style>
body{
margin:0;
background:#313338;
color:white;
font-family:Arial,sans-serif;
}

.hero{
height:350px;
background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200') center/cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hero h1{
font-size:55px;
margin:0;
}

.hero p{
font-size:18px;
opacity:.9;
}

.discord-btn{
background:#5865F2;
padding:15px 30px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
margin-top:20px;
}

.info{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e1f22;
padding:20px;
border-radius:15px;
}

.buy{
background:#57F287;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#1e1f22;
margin-top:40px;
}
</style>
</head>

<body>

<div class="hero">
<h1>Eclipse Store</h1>
<p>Sua referência em assinaturas premium</p>
<a class="discord-btn" href="#">Entrar no Discord</a>
</div>

<div class="info">
<h2>Produtos</h2>

<div class="products">

<div class="card">
<h3>Netflix Premium</h3>
<p>30 dias de acesso</p>
<button class="buy">Comprar</button>
</div>

<div class="card">
<h3>HBO Max</h3>
<p>30 dias de acesso</p>
<button class="buy">Comprar</button>
</div>

<div class="card">
<h3>Spotify Premium</h3>
<p>30 dias de acesso</p>
<button class="buy">Comprar</button>
</div>

</div>
</div>

<footer>
© 2026 Eclipse Store
</footer>

</body>
</html>
